name: plus90
description: "A premium football predictions app."
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.3
  google_fonts: ^6.1.0  # Use this instead of local font files
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.5.0
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  purchases_flutter: ^9.9.4
  flutter_dotenv: ^6.0.0
  in_app_purchase: ^3.1.11
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  file_picker: ^10.3.10
  fl_chart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/.env
  